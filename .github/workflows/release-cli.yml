name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@decoperations'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter @decoperations/owasp-wtf

      - name: Publish to GitHub Packages
        run: pnpm --filter @decoperations/owasp-wtf publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'CLI v${{ steps.version.outputs.version }}'
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
