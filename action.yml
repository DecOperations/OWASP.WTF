name: 'OWASP.WTF Security Scan'
description: 'Run an OWASP Top 10 oriented AppSec scan on your repository using the OWASP.WTF meta-scanner CLI.'
author: 'DecOperations'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  directory:
    description: 'Directory to scan'
    required: false
    default: '.'
  mode:
    description: 'Scan mode: quick | scan | deep'
    required: false
    default: 'scan'
  format:
    description: 'Output format: terminal | json | sarif | markdown | html | fix-plan'
    required: false
    default: 'sarif'
  output:
    description: 'Path to write the scan report'
    required: false
    default: 'owasp-wtf.sarif'
  ignore:
    description: 'Comma-separated ignore globs'
    required: false
    default: ''
  fail-on:
    description: 'Fail the workflow if any finding has severity >= this (critical | high | medium | low). Empty = never fail.'
    required: false
    default: 'high'
  install-tools:
    description: 'Comma-separated list of OSS scanners to install before running. Supported: semgrep,gitleaks,trivy,syft,grype,hadolint. Empty = skip and let the CLI degrade gracefully.'
    required: false
    default: 'semgrep,gitleaks,trivy'
  agent:
    description: 'For format=fix-plan: claude | cursor | codex | copilot | generic'
    required: false
    default: 'generic'
  version:
    description: 'CLI version to install (defaults to latest published)'
    required: false
    default: 'latest'
  upload-artifact:
    description: 'Upload the report as a workflow artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: false
    default: 'owasp-wtf-report'
  upload-sarif:
    description: 'Upload SARIF to GitHub code scanning (requires security-events: write). Auto-enabled when format=sarif.'
    required: false
    default: 'auto'
  node-version:
    description: 'Node.js version used to run the CLI'
    required: false
    default: '22'
  github-token:
    description: 'Token used to install the CLI from GitHub Packages (needs read:packages)'
    required: false
    default: ${{ github.token }}

outputs:
  report-path:
    description: 'Path to the generated report file'
    value: ${{ steps.scan.outputs.report-path }}
  findings:
    description: 'Total number of findings reported (when format=json or sarif)'
    value: ${{ steps.scan.outputs.findings }}
  score:
    description: 'Risk score 0-100 (when format=json)'
    value: ${{ steps.scan.outputs.score }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://npm.pkg.github.com'
        scope: '@decoperations'

    - name: Install OWASP.WTF CLI
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.github-token }}
      run: |
        npm install -g "@decoperations/owasp-wtf@${{ inputs.version }}"

    - name: Install OSS scanners
      shell: bash
      if: ${{ inputs.install-tools != '' }}
      env:
        TOOLS: ${{ inputs.install-tools }}
      run: |
        set -euo pipefail
        IFS=',' read -ra REQUESTED <<< "$TOOLS"
        for raw in "${REQUESTED[@]}"; do
          tool="$(echo "$raw" | tr -d '[:space:]')"
          [ -z "$tool" ] && continue
          echo "::group::Install $tool"
          case "$tool" in
            semgrep)
              python3 -m pip install --user semgrep
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              ;;
            gitleaks)
              curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/scripts/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            trivy)
              curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            syft)
              curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            grype)
              curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            hadolint)
              sudo curl -sSfL -o /usr/local/bin/hadolint \
                https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
              sudo chmod +x /usr/local/bin/hadolint
              ;;
            *)
              echo "::warning::Unknown tool '$tool' — skipping. Supported: semgrep, gitleaks, trivy, syft, grype, hadolint."
              ;;
          esac
          echo "::endgroup::"
        done

    - name: Doctor — show installed scanners
      shell: bash
      run: owasp-wtf doctor || true

    - name: Run OWASP.WTF scan
      id: scan
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        DIRECTORY: ${{ inputs.directory }}
        FORMAT: ${{ inputs.format }}
        OUTPUT: ${{ inputs.output }}
        IGNORE: ${{ inputs.ignore }}
        FAIL_ON: ${{ inputs.fail-on }}
        AGENT: ${{ inputs.agent }}
      run: |
        set -o pipefail
        args=(
          "$MODE"
          "$DIRECTORY"
          --no-banner
          --format "$FORMAT"
          --output "$OUTPUT"
        )
        if [ -n "$IGNORE" ]; then
          args+=(--ignore "$IGNORE")
        fi
        if [ -n "$FAIL_ON" ]; then
          args+=(--fail-on "$FAIL_ON")
        fi
        if [ "$FORMAT" = "fix-plan" ]; then
          args+=(--agent "$AGENT")
        fi

        echo "::group::owasp-wtf ${args[*]}"
        scan_exit=0
        owasp-wtf "${args[@]}" || scan_exit=$?
        echo "::endgroup::"

        echo "report-path=$OUTPUT" >> "$GITHUB_OUTPUT"

        # Extract finding count + score from JSON / SARIF when available.
        findings=""
        score=""
        if [ -f "$OUTPUT" ]; then
          if [ "$FORMAT" = "json" ]; then
            findings=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(String((r.findings||[]).length))}catch(e){process.stdout.write('')}" "$OUTPUT")
            score=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(String(r.score??''))}catch(e){process.stdout.write('')}" "$OUTPUT")
          elif [ "$FORMAT" = "sarif" ]; then
            findings=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));const n=(r.runs||[]).reduce((a,run)=>a+(run.results||[]).length,0);process.stdout.write(String(n))}catch(e){process.stdout.write('')}" "$OUTPUT")
          fi
        fi
        echo "findings=$findings" >> "$GITHUB_OUTPUT"
        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "Findings: ${findings:-unknown}  Score: ${score:-n/a}"

        exit "$scan_exit"

    - name: Upload SARIF to GitHub code scanning
      if: ${{ always() && (inputs.upload-sarif == 'true' || (inputs.upload-sarif == 'auto' && inputs.format == 'sarif')) && hashFiles(inputs.output) != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output }}
        category: owasp-wtf

    - name: Upload scan report
      if: ${{ always() && inputs.upload-artifact == 'true' && hashFiles(inputs.output) != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}
