name: 'OWASP.WTF Security Scan'
description: 'Run an OWASP Top 10 oriented AppSec scan on your repository using the OWASP.WTF meta-scanner CLI.'
author: 'DecOperations'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  directory:
    description: 'Directory to scan'
    required: false
    default: '.'
  mode:
    description: 'Scan mode: quick | scan | deep'
    required: false
    default: 'scan'
  format:
    description: 'Output format: terminal | json | sarif | markdown | html | fix-plan'
    required: false
    default: 'sarif'
  output:
    description: 'Path to write the scan report'
    required: false
    default: 'owasp-wtf.sarif'
  ignore:
    description: 'Comma-separated ignore globs'
    required: false
    default: ''
  fail-on:
    description: 'Fail the workflow if any finding has severity >= this (critical | high | medium | low). Empty = never fail.'
    required: false
    default: 'high'
  install-tools:
    description: 'Comma-separated list of OSS scanners to install before running. Supported: semgrep,gitleaks,trivy,syft,grype,hadolint. Empty = skip and let the CLI degrade gracefully.'
    required: false
    default: 'semgrep,gitleaks,trivy'
  agent:
    description: 'For format=fix-plan: claude | cursor | codex | copilot | generic'
    required: false
    default: 'generic'
  version:
    description: 'CLI version to install (defaults to latest published)'
    required: false
    default: 'latest'
  upload-artifact:
    description: 'Upload the report as a workflow artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: false
    default: 'owasp-wtf-report'
  upload-sarif:
    description: 'Upload SARIF to GitHub code scanning (requires security-events: write). Auto-enabled when format=sarif.'
    required: false
    default: 'auto'
  node-version:
    description: 'Node.js version used to run the CLI'
    required: false
    default: '22'
  github-token:
    description: 'Token used to install the CLI from GitHub Packages (needs read:packages)'
    required: false
    default: ${{ github.token }}
  workspace:
    description: 'Scope the scan to one or more workspace subdirectories (relative to `directory`). Comma- or newline-separated. Empty = scan the whole project root.'
    required: false
    default: ''
  baseline:
    description: 'Path to a baseline file. Findings already recorded in the baseline are excluded from the report and from --fail-on grading. Commit this file to suppress pre-existing findings on first rollout.'
    required: false
    default: ''
  update-baseline:
    description: 'Write a fresh baseline file from the current findings and exit success. Use this to (re)generate the snapshot.'
    required: false
    default: 'false'
  include-build-output:
    description: 'Scan build artifact directories (.next, dist, build, .turbo, coverage, out). Off by default to suppress false positives in Next.js / monorepos.'
    required: false
    default: 'false'
  cache-cli:
    description: 'Cache the downloaded CLI tarball under ~/.cache/owasp-wtf/. Keeps repeat runs on a self-hosted runner from re-downloading the tarball.'
    required: false
    default: 'true'

outputs:
  report-path:
    description: 'Path to the generated report file'
    value: ${{ steps.scan.outputs.report-path }}
  findings:
    description: 'Total number of findings reported (when format=json or sarif)'
    value: ${{ steps.scan.outputs.findings }}
  score:
    description: 'Risk score 0-100 (when format=json)'
    value: ${{ steps.scan.outputs.score }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install OWASP.WTF CLI
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION_INPUT: ${{ inputs.version }}
        CACHE_CLI: ${{ inputs.cache-cli }}
      run: |
        # Install the CLI from a GitHub Release tarball asset. This avoids
        # GitHub Packages cross-repo auth limitations: a consumer repo's
        # default GITHUB_TOKEN cannot read packages from another repo, but
        # it can always read release assets (public: no auth; private: this
        # token suffices).
        set -euo pipefail

        api_args=(-sSfL -H "Accept: application/vnd.github+json")
        if [ -n "${GH_TOKEN:-}" ]; then
          api_args+=(-H "Authorization: Bearer ${GH_TOKEN}")
        fi

        version_input="${VERSION_INPUT:-latest}"
        if [ "$version_input" = "latest" ] || [ -z "$version_input" ]; then
          tag="$(curl "${api_args[@]}" \
            "https://api.github.com/repos/DecOperations/OWASP.WTF/releases?per_page=30" \
            | grep -oE '"tag_name":[[:space:]]*"cli-v[^"]+"' | head -n1 \
            | sed -E 's/.*"(cli-v[^"]+)".*/\1/')"
          if [ -z "$tag" ]; then
            echo "::error::Could not resolve latest cli-v* release tag"
            exit 1
          fi
        else
          # Accept "0.2.2", "v0.2.2", or "cli-v0.2.2"
          raw="$version_input"
          raw="${raw#v}"
          raw="${raw#cli-v}"
          tag="cli-v${raw}"
        fi
        version="${tag#cli-v}"
        asset_name="decoperations-owasp-wtf-${version}.tgz"

        # Optional local tarball cache. On self-hosted runners with high
        # PR throughput this avoids ~30s of redundant download per job.
        cache_dir="${HOME}/.cache/owasp-wtf"
        cached_tarball="${cache_dir}/${asset_name}"
        use_cache="false"
        if [ "${CACHE_CLI:-true}" = "true" ] && [ -f "${cached_tarball}" ]; then
          echo "Using cached CLI tarball at ${cached_tarball}"
          use_cache="true"
        fi

        if [ "${use_cache}" = "true" ]; then
          npm install -g "${cached_tarball}"
        else
          # Resolve the tarball asset via the releases API so this works on
          # private repos too (Accept: octet-stream redirects to a signed URL).
          release_json="$(curl "${api_args[@]}" \
            "https://api.github.com/repos/DecOperations/OWASP.WTF/releases/tags/${tag}")"
          asset_url="$(printf '%s' "$release_json" \
            | jq -r --arg name "$asset_name" \
                '.assets[]? | select(.name == $name) | .url')"
          if [ -z "$asset_url" ]; then
            echo "::error::Release ${tag} has no asset named ${asset_name}."
            echo "::error::Older releases may pre-date the tarball-asset rollout — pin a newer version (e.g. version: '0.2.3+') or use version: 'latest'."
            exit 1
          fi

          tmp="$(mktemp -d)"
          dl_args=(-sSfL -H "Accept: application/octet-stream")
          if [ -n "${GH_TOKEN:-}" ]; then
            dl_args+=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi
          echo "Downloading ${asset_name} from ${tag}"
          curl "${dl_args[@]}" -o "$tmp/cli.tgz" "$asset_url"
          npm install -g "$tmp/cli.tgz"

          if [ "${CACHE_CLI:-true}" = "true" ]; then
            mkdir -p "${cache_dir}"
            cp "$tmp/cli.tgz" "${cached_tarball}"
            echo "Cached tarball to ${cached_tarball}"
          fi
          rm -rf "$tmp"
        fi

        owasp-wtf --version

    - name: Install OSS scanners
      shell: bash
      if: ${{ inputs.install-tools != '' }}
      env:
        TOOLS: ${{ inputs.install-tools }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        IFS=',' read -ra REQUESTED <<< "$TOOLS"
        for raw in "${REQUESTED[@]}"; do
          tool="$(echo "$raw" | tr -d '[:space:]')"
          [ -z "$tool" ] && continue
          echo "::group::Install $tool"
          case "$tool" in
            semgrep)
              python3 -m pip install --user semgrep
              echo "$HOME/.local/bin" >> "$GITHUB_PATH"
              ;;
            gitleaks)
              # Upstream removed scripts/install.sh, so we resolve the latest
              # release tag via the GitHub API and download the binary directly.
              # Asset naming uses `x64` (not `amd64`) — see issue #21.
              os="$(uname -s | tr '[:upper:]' '[:lower:]')"
              case "$(uname -m)" in
                x86_64|amd64) arch="x64" ;;
                arm64|aarch64) arch="arm64" ;;
                armv7l|armv6l) arch="armv7" ;;
                *) echo "::error::Unsupported arch for gitleaks: $(uname -m)"; exit 1 ;;
              esac
              api_args=(-sSfL -H "Accept: application/vnd.github+json")
              if [ -n "${GH_TOKEN:-}" ]; then
                api_args+=(-H "Authorization: Bearer ${GH_TOKEN}")
              fi
              tag="$(curl "${api_args[@]}" \
                https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
                | grep -oE '"tag_name":\s*"[^"]+"' | head -n1 \
                | sed -E 's/.*"tag_name":\s*"([^"]+)".*/\1/')"
              if [ -z "$tag" ]; then
                echo "::error::Failed to resolve latest gitleaks release tag"
                exit 1
              fi
              version="${tag#v}"
              asset="gitleaks_${version}_${os}_${arch}.tar.gz"
              url="https://github.com/gitleaks/gitleaks/releases/download/${tag}/${asset}"
              echo "Downloading $url"
              tmp="$(mktemp -d)"
              curl -sSfL "$url" -o "$tmp/gitleaks.tar.gz"
              tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
              sudo install -m 0755 "$tmp/gitleaks" /usr/local/bin/gitleaks
              rm -rf "$tmp"
              gitleaks version
              ;;
            trivy)
              curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            syft)
              curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            grype)
              curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
                | sh -s -- -b /usr/local/bin
              ;;
            hadolint)
              sudo curl -sSfL -o /usr/local/bin/hadolint \
                https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
              sudo chmod +x /usr/local/bin/hadolint
              ;;
            *)
              echo "::warning::Unknown tool '$tool' — skipping. Supported: semgrep, gitleaks, trivy, syft, grype, hadolint."
              ;;
          esac
          echo "::endgroup::"
        done

    - name: Doctor — show installed scanners
      shell: bash
      run: owasp-wtf doctor || true

    - name: Run OWASP.WTF scan
      id: scan
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        DIRECTORY: ${{ inputs.directory }}
        FORMAT: ${{ inputs.format }}
        OUTPUT: ${{ inputs.output }}
        IGNORE: ${{ inputs.ignore }}
        FAIL_ON: ${{ inputs.fail-on }}
        AGENT: ${{ inputs.agent }}
        WORKSPACE: ${{ inputs.workspace }}
        BASELINE: ${{ inputs.baseline }}
        UPDATE_BASELINE: ${{ inputs.update-baseline }}
        INCLUDE_BUILD_OUTPUT: ${{ inputs.include-build-output }}
      run: |
        set -o pipefail
        args=(
          "$MODE"
          "$DIRECTORY"
          --no-banner
          --format "$FORMAT"
          --output "$OUTPUT"
        )
        if [ -n "$IGNORE" ]; then
          args+=(--ignore "$IGNORE")
        fi
        if [ -n "$FAIL_ON" ]; then
          args+=(--fail-on "$FAIL_ON")
        fi
        if [ "$FORMAT" = "fix-plan" ]; then
          args+=(--agent "$AGENT")
        fi
        if [ "${INCLUDE_BUILD_OUTPUT:-false}" = "true" ]; then
          args+=(--include-build-output)
        fi
        if [ -n "$BASELINE" ]; then
          args+=(--baseline "$BASELINE")
          if [ "${UPDATE_BASELINE:-false}" = "true" ]; then
            args+=(--update-baseline)
          fi
        fi
        if [ -n "$WORKSPACE" ]; then
          # Accept comma-, newline-, or whitespace-separated workspace lists.
          while IFS= read -r ws; do
            ws="$(echo "$ws" | tr -d '[:space:]')"
            [ -z "$ws" ] && continue
            args+=(--workspace "$ws")
          done < <(echo "$WORKSPACE" | tr ',' '\n')
        fi

        echo "::group::owasp-wtf ${args[*]}"
        scan_exit=0
        owasp-wtf "${args[@]}" || scan_exit=$?
        echo "::endgroup::"

        echo "report-path=$OUTPUT" >> "$GITHUB_OUTPUT"

        # Extract finding count + score from JSON / SARIF when available.
        findings=""
        score=""
        if [ -f "$OUTPUT" ]; then
          if [ "$FORMAT" = "json" ]; then
            findings=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(String((r.findings||[]).length))}catch(e){process.stdout.write('')}" "$OUTPUT")
            score=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));process.stdout.write(String(r.score??''))}catch(e){process.stdout.write('')}" "$OUTPUT")
          elif [ "$FORMAT" = "sarif" ]; then
            findings=$(node -e "try{const r=JSON.parse(require('fs').readFileSync(process.argv[1],'utf8'));const n=(r.runs||[]).reduce((a,run)=>a+(run.results||[]).length,0);process.stdout.write(String(n))}catch(e){process.stdout.write('')}" "$OUTPUT")
          fi
        fi
        echo "findings=$findings" >> "$GITHUB_OUTPUT"
        echo "score=$score" >> "$GITHUB_OUTPUT"
        echo "Findings: ${findings:-unknown}  Score: ${score:-n/a}"

        exit "$scan_exit"

    - name: Upload SARIF to GitHub code scanning
      if: ${{ always() && (inputs.upload-sarif == 'true' || (inputs.upload-sarif == 'auto' && inputs.format == 'sarif')) && hashFiles(inputs.output) != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs.output }}
        category: owasp-wtf

    - name: Upload scan report
      if: ${{ always() && inputs.upload-artifact == 'true' && hashFiles(inputs.output) != '' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}
